# ============================================================================
# CartoEddy – Cartographer + Eddy-NG Integration
#
# Referenz-Konfiguration fuer BTT Eddy via CAN
# Druckbare Flaeche: X 0..350, Y 0..300
#
# Ersteinrichtung:
#   1. Klipper neustarten
#   2. CARTOGRAPHER_SCAN_CALIBRATE METHOD=TOUCH
#   3. SAVE_CONFIG
# ============================================================================

# ── Eddy MCU (CAN) ────────────────────────────────────────────────────────
[mcu eddy]
canbus_uuid: CHANGE_ME

# ── CartoEddy Hauptsektion ─────────────────────────────────────────────────
[cartographer_eddy]
# Sensor (wird an LDC1612_ng durchgereicht)
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f

# Offsets Duese -> Probe (mm)
x_offset: 0.0
y_offset: 16.0

# Bewegungsparameter
travel_speed: 50.0
lift_speed: 10.0

# Tap-Modus: wma (schnell, default) oder sos (Butterworth, sauberer)
tap_mode: wma

# ── Scan-Konfiguration ────────────────────────────────────────────────────
[cartographer_eddy scan]
# probe_speed: 5        # Z-Geschwindigkeit beim Proben (mm/s)
# mesh_runs: 1          # Anzahl Mesh-Durchlaeufe
# mesh_height: 3        # Hoehe waehrend Mesh-Scan (mm)

# ── Touch-Konfiguration ───────────────────────────────────────────────────
[cartographer_eddy touch]
samples: 5
max_samples: 20
sample_range: 0.0050

# Scan/Touch-Modelle werden automatisch erstellt:
#   CARTOGRAPHER_SCAN_CALIBRATE  -> [cartographer_eddy scan_model default]
#   CARTOGRAPHER_TOUCH_CALIBRATE -> [cartographer_eddy touch_model default]

# ── stepper_z – PFLICHT ───────────────────────────────────────────────────
# Diese Einstellungen muessen in der stepper_z Sektion stehen:
#
# [stepper_z]
# endstop_pin: probe:z_virtual_endstop
# homing_retract_dist: 0

# ── Temperaturueberwachung ─────────────────────────────────────────────────
[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

# ── Bed Mesh ──────────────────────────────────────────────────────────────
[bed_mesh]
zero_reference_position: 175, 150
speed: 200
horizontal_move_z: 3.5
mesh_min: 20, 30
mesh_max: 320, 270
probe_count: 9, 9
algorithm: bicubic
fade_start: 0.6
fade_end: 10.0
adaptive_margin: 10

# ── Quad Gantry Level ─────────────────────────────────────────────────────
[quad_gantry_level]
gantry_corners:
    -60,-10
    410,420
points:
    20,25
    20,275
    325,275
    325,25
speed: 200
horizontal_move_z: 3
max_adjust: 60
retries: 10
retry_tolerance: 0.005

# ============================================================================
# Makros
# ============================================================================

# ── QGL Wrapper: 2-stufig (coarse + fine) ─────────────────────────────────
[gcode_macro QUAD_GANTRY_LEVEL]
description: 2-stufiges QGL (coarse @10mm, fine @3mm)
rename_existing: _QUAD_GANTRY_LEVEL
gcode:
  {% set coarse_z   = params.COARSE_Z|default(10.0)|float %}
  {% set fine_z     = params.FINE_Z|default(3.0)|float %}
  {% set coarse_tol = params.COARSE_TOL|default(0.05)|float %}
  {% set fine_tol   = params.FINE_TOL|default(0.005)|float %}
  {% set coarse_r   = params.COARSE_RETRIES|default(10)|int %}
  {% set fine_r     = params.FINE_RETRIES|default(10)|int %}

  {% if params.RAW|default(0)|int == 1 %}
    _QUAD_GANTRY_LEVEL
  {% else %}
    {% set homed = printer.toolhead.homed_axes %}
    {% if 'x' not in homed or 'y' not in homed %}
      G28 X Y
    {% endif %}

    {% if 'z' in homed %}
      G90
      G0 Z{coarse_z} F1000
    {% endif %}

    M117 QGL coarse
    _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z={coarse_z} RETRY_TOLERANCE={coarse_tol} RETRIES={coarse_r}

    G90
    G0 Z{coarse_z} F1000

    M117 QGL fine
    _QUAD_GANTRY_LEVEL HORIZONTAL_MOVE_Z={fine_z} RETRY_TOLERANCE={fine_tol} RETRIES={fine_r}

    M117 QGL done
  {% endif %}

# ── Homing Routine ────────────────────────────────────────────────────────
[gcode_macro HOMING_ROUTINE]
description: Vollstaendiges Homing: XY -> QGL -> Z Touch -> Mesh
gcode:
  ENSURE_TOOL_MOUNTED

  # Probe-Offsets aus CartoEddy-Config lesen
  {% set cfg = printer.configfile.settings %}
  {% if 'cartographer_eddy' in cfg %}
    {% set px = cfg['cartographer_eddy'].x_offset|default(0.0)|float %}
    {% set py = cfg['cartographer_eddy'].y_offset|default(0.0)|float %}
  {% elif 'probe' in cfg %}
    {% set px = cfg.probe.x_offset|default(0.0)|float %}
    {% set py = cfg.probe.y_offset|default(0.0)|float %}
  {% else %}
    {% set px = 0.0 %}
    {% set py = 0.0 %}
  {% endif %}

  # Bettmitte berechnen (nur druckbarer Bereich Y>=0)
  {% set axmin = printer.toolhead.axis_minimum %}
  {% set axmax = printer.toolhead.axis_maximum %}
  {% set bed_min_x = (0.0 if axmin.x < 0 else axmin.x)|float %}
  {% set bed_min_y = (0.0 if axmin.y < 0 else axmin.y)|float %}
  {% set bed_max_x = axmax.x|float %}
  {% set bed_max_y = axmax.y|float %}
  {% set cx = ((bed_min_x + bed_max_x) / 2.0 - px)|float %}
  {% set cy = ((bed_min_y + bed_max_y) / 2.0 - py)|float %}

  # 1) Home XYZ
  SET_GCODE_OFFSET Z=0
  G28
  G90

  # 2) QGL (2-stufig)
  QUAD_GANTRY_LEVEL

  # 3) Z fein via Touch an Bettmitte
  CLEAN_NOZZLE
  G1 Z10 F5000
  G1 X{ '%.3f' % cx } Y{ '%.3f' % cy } F5000
  CARTOGRAPHER_TOUCH_HOME
  G0 Z3 F5000

  # 4) Bed Mesh
  BED_MESH_CLEAR
  BED_MESH_CALIBRATE

  # 5) Zurueck zur Mitte
  G1 X{ '%.3f' % cx } Y{ '%.3f' % cy } F2000

# ── Utility ───────────────────────────────────────────────────────────────
[gcode_macro ENSURE_TOOL_MOUNTED]
description: Laedt T0, falls kein Tool aktiv ist
gcode:
  {% if not printer.toolhead.extruder %}
    T0
  {% endif %}
